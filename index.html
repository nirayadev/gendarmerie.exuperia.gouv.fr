<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gendarmerie Nationale · Exuperia</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0d10;
            --bg-card: #161a1f;
            --bg-card-hover: #1f252c;
            --bg-input: #1e242b;
            --text: #e8edf2;
            --text-muted: #8896a6;
            --border: #2a313a;
            --accent: #e67e22;
            --accent-hover: #d35400;
            --accent-glow: rgba(230, 126, 34, .15);
            --shadow: 0 4px 24px rgba(0, 0, 0, .6);
            --radius: 12px;
            --transition: .25s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body.light {
            --bg: #f0f2f5;
            --bg-card: #ffffff;
            --bg-card-hover: #f5f7fa;
            --bg-input: #e9ecf0;
            --text: #1e2329;
            --text-muted: #5a6a7a;
            --border: #d0d7de;
            --shadow: 0 4px 24px rgba(0, 0, 0, .10);
            --accent-glow: rgba(230, 126, 34, .12);
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 8px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 28px;
            background: var(--bg-card);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 2px 12px rgba(0, 0, 0, .3);
            flex-wrap: wrap;
            gap: 12px 20px;
            transition: background var(--transition), border-color var(--transition);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-left .logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, .4));
            flex-shrink: 0;
        }

        .topbar-title {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .topbar-title h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: .3px;
            background: linear-gradient(135deg, var(--text) 60%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .topbar-title .badge {
            font-size: .6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            background: var(--accent);
            color: #0b0d10;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            width: fit-content;
            margin-top: 1px;
            -webkit-text-fill-color: #0b0d10;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .topbar-right .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .topbar-right .search-wrap input {
            padding: 8px 14px 8px 36px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: .85rem;
            width: 200px;
            transition: var(--transition);
            outline: none;
        }
        .topbar-right .search-wrap input::placeholder {
            color: var(--text-muted);
            opacity: .7;
        }
        .topbar-right .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            width: 240px;
        }
        .topbar-right .search-wrap .icon-search {
            position: absolute;
            left: 12px;
            font-size: 1rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        .theme-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-input);
            padding: 4px 10px 4px 12px;
            border-radius: 40px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .theme-selector label {
            font-size: .75rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: .3px;
        }
        .theme-selector select {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: .8rem;
            padding: 4px 0;
            outline: none;
            cursor: pointer;
            font-weight: 500;
        }
        .theme-selector select option {
            background: var(--bg-card);
            color: var(--text);
        }

        .menu-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 28px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            transition: background var(--transition), border-color var(--transition);
            position: sticky;
            top: 72px;
            z-index: 99;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
        }

        .menu-bar .home-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.25rem;
            background: var(--bg-input);
            transition: var(--transition);
            border: 1px solid transparent;
            flex-shrink: 0;
        }
        .menu-bar .home-link:hover {
            background: var(--accent);
            color: #0b0d10;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .menu-bar .dropdown {
            position: relative;
        }

        .menu-bar .dropdown > .dropbtn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: .85rem;
            font-weight: 600;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .menu-bar .dropdown > .dropbtn:hover {
            background: var(--bg-input);
            border-color: var(--border);
        }
        .menu-bar .dropdown > .dropbtn .arrow {
            font-size: .6rem;
            margin-left: 2px;
            opacity: .6;
            transition: transform var(--transition);
        }
        .menu-bar .dropdown:hover > .dropbtn .arrow {
            transform: rotate(180deg);
        }

        .menu-bar .dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            min-width: 220px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 0;
            box-shadow: var(--shadow);
            z-index: 200;
            overflow: hidden;
            transition: opacity var(--transition), transform var(--transition);
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
        }
        .menu-bar .dropdown:hover .dropdown-content {
            display: block;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .menu-bar .dropdown-content a {
            display: block;
            padding: 10px 20px;
            font-size: .82rem;
            color: var(--text);
            transition: var(--transition);
            border-left: 3px solid transparent;
            font-weight: 500;
        }
        .menu-bar .dropdown-content a:hover {
            background: var(--bg-card-hover);
            border-left-color: var(--accent);
            color: var(--accent);
        }
        .menu-bar .dropdown-content a .sub {
            display: block;
            font-size: .7rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 1px;
        }

        .page-content {
            flex: 1;
            padding: 32px 28px 60px;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
            transition: opacity .3s ease;
            animation: fadeUp .4s ease;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-accueil .hero {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 48px 40px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: background var(--transition);
        }
        .page-accueil .hero::after {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            border-radius: 50%;
            opacity: .4;
            pointer-events: none;
        }
        .page-accueil .hero h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        .page-accueil .hero h2 span {
            color: var(--accent);
        }
        .page-accueil .hero p {
            font-size: 1.05rem;
            color: var(--text-muted);
            max-width: 600px;
            position: relative;
            z-index: 1;
            line-height: 1.6;
        }
        .page-accueil .hero .cta-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .page-accueil .hero .cta-group .btn {
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: .9rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            background: var(--accent);
            color: #0b0d10;
        }
        .page-accueil .hero .cta-group .btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .page-accueil .hero .cta-group .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .page-accueil .hero .cta-group .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
            transform: scale(1.02);
        }

        .page-accueil .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .page-accueil .grid-cards .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 20px;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .page-accueil .grid-cards .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .25);
        }
        .page-accueil .grid-cards .card .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }
        .page-accueil .grid-cards .card h3 {
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .page-accueil .grid-cards .card p {
            font-size: .85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .page-generic {
            animation: fadeUp .4s ease;
        }
        .page-generic .page-header {
            margin-bottom: 24px;
        }
        .page-generic .page-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-generic .page-header h2::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, var(--accent), transparent);
        }
        .page-generic .page-header .subhead {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 4px;
        }
        .page-generic .card-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: var(--shadow);
            line-height: 1.7;
            transition: background var(--transition), border-color var(--transition);
        }
        .page-generic .card-content p {
            margin-bottom: 14px;
            color: var(--text-muted);
        }
        .page-generic .card-content p:last-child {
            margin-bottom: 0;
        }
        .page-generic .card-content strong {
            color: var(--text);
        }
        .page-generic .card-content ul {
            padding-left: 24px;
            margin: 12px 0 16px;
            color: var(--text-muted);
        }
        .page-generic .card-content ul li {
            margin-bottom: 6px;
        }

        .page-indispo {
            text-align: center;
            padding: 60px 20px;
        }
        .page-indispo .big-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            display: block;
        }
        .page-indispo h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .page-indispo p {
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto;
        }

        @media (max-width: 820px) {
            .topbar {
                padding: 10px 16px;
            }
            .topbar-title h1 {
                font-size: 1.05rem;
            }
            .topbar-right .search-wrap input {
                width: 140px;
            }
            .topbar-right .search-wrap input:focus {
                width: 170px;
            }
            .menu-bar {
                padding: 6px 12px;
                gap: 4px;
                top: 68px;
            }
            .menu-bar .dropdown > .dropbtn {
                font-size: .75rem;
                padding: 6px 10px;
            }
            .menu-bar .dropdown-content {
                min-width: 170px;
            }
            .menu-bar .dropdown-content a {
                padding: 8px 14px;
                font-size: .75rem;
            }
            .page-content {
                padding: 20px 14px 40px;
            }
            .page-accueil .hero {
                padding: 28px 20px;
            }
            .page-accueil .hero h2 {
                font-size: 1.5rem;
            }
            .page-accueil .grid-cards {
                grid-template-columns: 1fr 1fr;
            }
            .theme-selector label {
                display: none;
            }
        }

        @media (max-width: 540px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 10px 14px;
            }
            .topbar-left {
                justify-content: center;
            }
            .topbar-right {
                justify-content: center;
            }
            .topbar-right .search-wrap input {
                width: 100%;
            }
            .topbar-right .search-wrap input:focus {
                width: 100%;
            }
            .menu-bar {
                justify-content: center;
                top: 108px;
                gap: 2px;
            }
            .menu-bar .dropdown > .dropbtn {
                font-size: .7rem;
                padding: 4px 8px;
            }
            .menu-bar .home-link {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
            .page-accueil .grid-cards {
                grid-template-columns: 1fr;
            }
            .page-accueil .hero h2 {
                font-size: 1.3rem;
            }
            .page-generic .card-content {
                padding: 20px 16px;
            }
        }
    </style>
</head>

<body>
    <header class="topbar" role="banner">
        <div class="topbar-left">
            <img class="logo" src="/utils/public/images/index/ministre.png" alt="Logo Gendarmerie Nationale" />
            <div class="topbar-title">
                <h1>Gendarmerie Nationale</h1>
                <span class="badge">SITE NON OFFICIEL · ROLEPLAY</span>
            </div>
        </div>
        <div class="topbar-right">
            <div class="search-wrap">
                <span class="icon-search">🔍</span>
                <input type="search" id="searchInput" placeholder="Rechercher..." aria-label="Rechercher" />
            </div>
            <div class="theme-selector">
                <label for="themeSelect">Thème</label>
                <select id="themeSelect" aria-label="Changer de thème">
                    <option value="system">Système</option>
                    <option value="dark">Sombre</option>
                    <option value="light">Clair</option>
                </select>
            </div>
        </div>
    </header>

    <nav class="menu-bar" role="navigation" aria-label="Navigation principale">
        <a href="#" class="home-link" data-page="accueil" title="Accueil" aria-label="Accueil">🏠</a>

        <div class="dropdown">
            <button class="dropbtn" aria-haspopup="true" aria-expanded="false">
                Présentation <span class="arrow">▾</span>
            </button>
            <div class="dropdown-content" role="menu">
                <a href="#" data-page="presentation" role="menuitem">Présentation</a>
                <a href="#" data-page="histoire" role="menuitem">Histoire et patrimoine</a>
                <a href="#" data-page="missions" role="menuitem">Les missions de la gendarmerie</a>
                <a href="#" data-page="international" role="menuitem">À l'international</a>
            </div>
        </div>

        <div class="dropdown">
            <button class="dropbtn" aria-haspopup="true" aria-expanded="false">
                Organisation <span class="arrow">▾</span>
            </button>
            <div class="dropdown-content" role="menu">
                <a href="#" data-page="unites" role="menuitem">Nos unités</a>
            </div>
        </div>

        <div class="dropdown">
            <button class="dropbtn" aria-haspopup="true" aria-expanded="false">
                La Gendarmerie Recrute <span class="arrow">▾</span>
            </button>
            <div class="dropdown-content" role="menu">
                <a href="#" data-page="recrutement" role="menuitem">Recrutement</a>
                <a href="#" data-page="offres" role="menuitem">Offres d'emploi</a>
            </div>
        </div>

        <div class="dropdown">
            <button class="dropbtn" aria-haspopup="true" aria-expanded="false">
                Nos sites <span class="arrow">▾</span>
            </button>
            <div class="dropdown-content" role="menu">
                <a href="#" data-page="indisponible" role="menuitem">Indisponible</a>
            </div>
        </div>
    </nav>

    <main class="page-content" id="pageContent" role="main">
    </main>

    <script>
        (function() {
            'use strict';

            const content = document.getElementById('pageContent');
            const themeSelect = document.getElementById('themeSelect');
            const searchInput = document.getElementById('searchInput');
            const menuLinks = document.querySelectorAll('[data-page]');

            function applyTheme(mode) {
                const body = document.body;
                if (mode === 'light') {
                    body.classList.add('light');
                } else if (mode === 'dark') {
                    body.classList.remove('light');
                } else { // system
                    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
                    body.classList.toggle('light', prefersLight);
                }
            }

            function loadStoredTheme() {
                const stored = localStorage.getItem('gendarmerie-theme') || 'system';
                themeSelect.value = stored;
                applyTheme(stored);
            }

            themeSelect.addEventListener('change', function(e) {
                const val = e.target.value;
                localStorage.setItem('gendarmerie-theme', val);
                applyTheme(val);
            });

            const systemMedia = window.matchMedia('(prefers-color-scheme: light)');
            systemMedia.addEventListener('change', function() {
                if (themeSelect.value === 'system') {
                    applyTheme('system');
                }
            });

            const pages = {

                accueil: `
                    <div class="page-accueil">
                        <div class="hero">
                            <h2>Bienvenue sur le portail <span>Roleplay</span></h2>
                            <p>Site non officiel à but ludique et éducatif. Découvrez l'univers de la Gendarmerie Nationale à travers nos pages.</p>
                            <div class="cta-group">
                                <button class="btn" data-page="presentation">Découvrir</button>
                                <button class="btn btn-outline" data-page="recrutement">Recrutement</button>
                            </div>
                        </div>
                        <div class="grid-cards">
                            <div class="card">
                                <span class="icon">⚜️</span>
                                <h3>Histoire &amp; Patrimoine</h3>
                                <p>Plongez dans l'héritage de la Gendarmerie, de la maréchaussée à nos jours.</p>
                            </div>
                            <div class="card">
                                <span class="icon">🛡️</span>
                                <h3>Nos Missions</h3>
                                <p>Découvrez les multiples missions qui font la fierté de nos gendarmes.</p>
                            </div>
                            <div class="card">
                                <span class="icon">🌍</span>
                                <h3>À l'international</h3>
                                <p>La Gendarmerie rayonne au-delà des frontières avec des partenariats solides.</p>
                            </div>
                            <div class="card">
                                <span class="icon">📋</span>
                                <h3>Recrutement</h3>
                                <p>Rejoignez nos rangs et participez à une aventure humaine exceptionnelle.</p>
                            </div>
                        </div>
                    </div>
                `,

                presentation: `
                    <div class="page-generic">
                        <div class="page-header">
                            <h2>Présentation</h2>
                            <div class="subhead">Découvrez l'institution et ses valeurs</div>
                        </div>
                        <div class="card-content">
                            <p><strong>La Gendarmerie Nationale</strong> est une force militaire française chargée de missions de police. Elle est subordonnée au ministère de l'Intérieur pour ses missions de sécurité et au ministère des Armées pour ses missions militaires.</p>
                            <p>Présente sur tout le territoire, elle assure la sécurité des citoyens, la lutte contre la délinquance, le maintien de l'ordre et participe à la défense nationale.</p>
                            <p><strong>Valeurs :</strong> engagement, loyauté, discipline, professionnalisme et proximité.</p>
                        </div>
                    </div>
                `,

                histoire: `
                    <div class="page-generic">
                        <div class="page-header">
                            <h2>Histoire et patrimoine</h2>
                            <div class="subhead">Des origines à nos jours</div>
                        </div>
                        <div class="card-content">
                            <p>La Gendarmerie Nationale puise ses racines dans la <strong>Maréchaussée</strong> créée au XIV<sup>e</sup> siècle. Elle est la plus ancienne institution de police de France.</p>
                            <p>En 1791, la Maréchaussée devient la Gendarmerie Nationale. Depuis, elle n'a cessé d'évoluer pour s'adapter aux défis de chaque époque.</p>

                        <p>Cette section est en cours de construction. Revenez plus tard !</p>

            };

            let currentPage = 'accueil';

            function navigateTo(pageId) {
                if (!pages[pageId]) {
                    pageId = 'accueil';
                }
                currentPage = pageId;
                content.innerHTML = pages[pageId] || pages.accueil;

                content.querySelectorAll('[data-page]').forEach(el => {
                    el.addEventListener('click', function(e) {
                        const target = this.getAttribute('data-page');
                        if (target) {
                            e.preventDefault();
                            navigateTo(target);
                            history.pushState({ page: target }, '', '#' + target);
                        }
                    });
                });

                const titles = {
                    accueil: 'Accueil · Gendarmerie Nationale RP',
                    presentation: 'Présentation · Gendarmerie Nationale RP',
                    histoire: 'Histoire · Gendarmerie Nationale RP',
                    missions: 'Missions · Gendarmerie Nationale RP',
                    international: 'International · Gendarmerie Nationale RP',
                    unites: 'Nos unités · Gendarmerie Nationale RP',
                    recrutement: 'Recrutement · Gendarmerie Nationale RP',
                    offres: 'Offres d\'emploi · Gendarmerie Nationale RP',
                    indisponible: 'Indisponible · Gendarmerie Nationale RP'
                };
                document.title = titles[pageId] || 'Gendarmerie Nationale · Roleplay';

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            menuLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const page = this.getAttribute('data-page');
                    if (page) {
                        navigateTo(page);
                        history.pushState({ page: page }, '', '#' + page);
                    }
                });
            });

            document.querySelector('.home-link')?.addEventListener('click', function(e) {
                e.preventDefault();
                navigateTo('accueil');
                history.pushState({ page: 'accueil' }, '', '#');
            });

            window.addEventListener('popstate', function(e) {
                const state = e.state;
                if (state && state.page) {
                    navigateTo(state.page);
                } else {
                    navigateTo('accueil');
                }
            });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const q = this.value.trim().toLowerCase();
                    if (!q) return;
                    const mapping = {
                        'accueil': 'accueil',
                        'présentation': 'presentation',
                        'histoire': 'histoire',
                        'patrimoine': 'histoire',
                        'mission': 'missions',
                        'missions': 'missions',
                        'international': 'international',
                        'unité': 'unites',
                        'unités': 'unites',
                        'recrutement': 'recrutement',
                        'emploi': 'offres',
                        'emplois': 'offres',
                        'offre': 'offres',
                        'offres': 'offres',
                        'indisponible': 'indisponible'
                    };
                    let found = null;
                    for (const [key, val] of Object.entries(mapping)) {
                        if (q.includes(key) || key.includes(q)) {
                            found = val;
                            break;
                        }
                    }
                    if (found) {
                        navigateTo(found);
                        history.pushState({ page: found }, '', '#' + found);
                        searchInput.value = '';
                    } else {
                        const keys = Object.keys(pages);
                        for (const k of keys) {
                            if (k.includes(q) || q.includes(k)) {
                                navigateTo(k);
                                history.pushState({ page: k }, '', '#' + k);
                                searchInput.value = '';
                                return;
                            }
                        }
                        alert('Aucune page ne correspond à votre recherche.');
                    }
                }
            });

            const hash = window.location.hash.replace('#', '');
            const startPage = (hash && pages[hash]) ? hash : 'accueil';
            navigateTo(startPage);
            if (startPage !== 'accueil') {
                history.replaceState({ page: startPage }, '', '#' + startPage);
            }

            loadStoredTheme();


        })();
    </script>
